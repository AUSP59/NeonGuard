apiVersion: v1
kind: ConfigMap
metadata:
  name: neonsec-grafana-dashboards
  labels:
    grafana_dashboard: "1"
data:
  NeonSec-Overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "type": "stat",
          "title": "Total Events",
          "targets": [
            {
              "expr": "sum(neonsec_events_total)"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "graph",
          "title": "Events Rate",
          "targets": [
            {
              "expr": "sum(rate(neonsec_events_total[5m]))"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 6,
            "y": 0
          }
        },
        {
          "type": "graph",
          "title": "DDoS Alerts",
          "targets": [
            {
              "expr": "sum(increase(neonsec_ddos_alerts_total[10m]))"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          }
        },
        {
          "type": "graph",
          "title": "Portscan Alerts",
          "targets": [
            {
              "expr": "sum(increase(neonsec_portscan_alerts_total[10m]))"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          }
        },
        {
          "type": "graph",
          "title": "Pipeline Latency (ms)",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(neonsec_pipeline_latency_bucket[5m])) by (le))"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 16
          }
        }
      ],
      "schemaVersion": 39,
      "title": "NeonSec - Overview",
      "version": 1,
      "timezone": "browser"
    }
  NeonSec-Incidents.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "type": "table",
          "title": "Top Sources (Last 1h)",
          "targets": [
            {
              "expr": "topk(10, sum by (src_ip) (increase(neonsec_events_total[1h])))"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "table",
          "title": "Top Destinations (Last 1h)",
          "targets": [
            {
              "expr": "topk(10, sum by (dst_ip) (increase(neonsec_events_total[1h])))"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 0
          }
        },
        {
          "type": "graph",
          "title": "Brute-force Alerts",
          "targets": [
            {
              "expr": "sum(increase(neonsec_bruteforce_alerts_total[15m]))"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 10
          }
        }
      ],
      "schemaVersion": 39,
      "title": "NeonSec - Incidents",
      "version": 1,
      "timezone": "browser"
    }
