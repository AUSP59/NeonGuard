name: slsa-provenance
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  id-token: write
  contents: write

jobs:
  build-provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release artifacts
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          tar czf neonsec-dist.tar.gz -C build .
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/actions/generator@v2.0.0
        with:
          artifact_path: neonsec-dist.tar.gz
          provenance_name: neonsec-dist.intoto.jsonl
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            neonsec-dist.tar.gz
            neonsec-dist.intoto.jsonl