name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
  security-events: write
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: cmake -S ci -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Build
        run: cmake --build build -j 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: cpp
          config-file: .github/codeql.yml
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build & Test (coverage flags, CI dir)
        run: |
          cmake -S ci -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build -j 2
          ctest --test-dir build --output-on-failure
      - name: Coverage Gate (advisory)
        continue-on-error: true
        run: |
          gcovr -r ci --branches --xml -o coverage.xml --fail-under-line 80
